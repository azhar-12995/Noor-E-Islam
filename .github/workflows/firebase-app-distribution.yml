name: Build and Upload APK to Firebase App Distribution

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  distribute:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Give Gradle permission
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew clean assembleDebug

      - name: Save Firebase service account
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > firebase-service-account.json

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Upload APK to Firebase App Distribution
        env:
          GOOGLE_APPLICATION_CREDENTIALS: firebase-service-account.json
        run: |
          firebase appdistribution:distribute app/build/outputs/apk/debug/app-debug.apk \
            --app "${{ secrets.FIREBASE_APP_ID }}" \
            --groups "${{ secrets.FIREBASE_TESTER_GROUP }}" \
            --release-notes "Latest APK from GitHub commit ${{ github.sha }}"