name: Build and Upload APK to Firebase App Distribution

on:
  push:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      # Checkout Project
      - name: Checkout Code
        uses: actions/checkout@v4

      # Setup Java 17
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # Give execute permission to gradlew
      - name: Grant Execute Permission
        run: chmod +x gradlew

      # Create Firebase Service Account JSON File
      - name: Create Firebase Credentials File
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > firebase-service-account.json

      # Set Google Credentials Environment Variable
      - name: Set GOOGLE_APPLICATION_CREDENTIALS
        run: |
          echo "GOOGLE_APPLICATION_CREDENTIALS=firebase-service-account.json" >> $GITHUB_ENV

      # Install Firebase CLI
      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      # Build Debug APK
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # Upload APK to Firebase App Distribution
      - name: Upload APK to Firebase
        run: |
          firebase appdistribution:distribute app/build/outputs/apk/debug/app-debug.apk \
            --app "1:202260724829:android:370b71851e622fe8c2e1b4" \
            --groups "qa-testers" \
            --release-notes "Latest APK from GitHub Commit ${{ github.sha }}"
